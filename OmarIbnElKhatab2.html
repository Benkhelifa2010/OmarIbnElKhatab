<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>صفحة التسجيل - ثانوية عمر بن الخطاب</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6; 
            margin: 0; 
            padding: 0;
            background-color: #eef2f3; /* Same light background as Page 1 */
        }
        header { 
            /* Same blue/teal gradient as Page 1 */
            background: linear-gradient(to right, #2c3e50, #4ca1af); 
            color: white; 
            padding: 30px; 
            text-align: center; 
            border-bottom: 5px solid #1a252f;
        }
        nav { 
            margin: 0; 
            background: #fff; 
            padding: 15px; 
            border-bottom: 2px solid #ddd;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        nav a { 
            margin: 0 15px; 
            text-decoration: none; 
            color: #2980b9; 
            font-weight: bold; 
            padding: 5px 10px;
            transition: 0.3s;
        }
        nav a:hover {
            background-color: #2980b9;
            color: white;
            border-radius: 5px;
        }
        
        .container {
            padding: 40px;
            display: flex;
            justify-content: center;
        }

        .form-container { 
            background: white; 
            padding: 30px; 
            border-radius: 15px; 
            width: 70%; /* Matching the width of Page 1's content card */
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            border: 2px solid #2c3e50;
        }

        h2 {
            color: #2c3e50;
            border-bottom: 2px solid #4ca1af;
            display: inline-block;
            padding-bottom: 5px;
        }

        input[type="text"], input[type="email"], select { 
            width: 100%; 
            padding: 12px; 
            margin: 10px 0 20px 0; 
            border: 1px solid #ccc; 
            border-radius: 8px; 
            box-sizing: border-box; 
            background-color: #fcfcfc;
        }

        input[type="submit"] { 
            background-color: #2c3e50; 
            color: white; 
            padding: 15px 20px; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            width: 100%; 
            font-size: 18px; 
            font-weight: bold;
            transition: 0.3s;
        }

        input[type="submit"]:hover { 
            background-color: #34495e; 
            transform: scale(1.02); /* Makes the button grow slightly when hovered */
        }

        /* Success Message Styling */
        #thank-you-section {
            display: none;
            text-align: center;
            padding: 40px;
        }
        .success-icon {
            font-size: 60px;
            color: #27ae60;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <header>
        <h1>ثانوية عمر بن الخطاب</h1>
    </header>

    <nav>
        <center>
            <a href="OmarIbnElKhatab.html">الرئيسية</a>
            <a href="OmarIbnElKhatab2.html">صفحة التسجيل (Page d'inscription)</a>
            <a href="OmarIbnElKhatab3.html">تقديم أنفسكم</a>
        </center>
    </nav>

    <div class="container">
        <div class="form-container">
            <div id="form-section">
                <center><h2>استمارة التسجيل بالمدرسة
				(Page d'inscription)</h2></center>
                <br>
                
                <form id="registrationForm">
                    <label><strong>الاسم الكامل:</strong></label>
                    <input type="text" placeholder="أدخل اسمك هنا..." required>

                    <label><strong>البريد الإلكتروني:</strong></label>
                    <input type="email" placeholder="example@gmail.com" required>

                    <label><strong>المستوى الدراسي:</strong></label>
                    <select>
                        <option>السنة الأولى ثانوي</option>
                        <option>السنة الثانية ثانوي</option>
                        <option>السنة الثالثة ثانوي</option>
                    </select>

                    <label><strong>ملاحظات إضافية:</strong></label>
                    <input type="text" placeholder="أي معلومات أخرى...">

                    <input type="submit" value="إرسال الطلب">
                </form>
            </div>
			<div style="text-align: center; padding: 20px;">
			<br><br>
<footer>
    <p>التلميذة: <strong>بن خليفة سلمى</strong></p>
</footer>

            <div id="thank-you-section">
                <div class="success-icon">✓</div>
                <h2>شكراً لك!</h2>
                <p>لقد تم إرسال طلب التسجيل الخاص بك بنجاح.</p>
                <p>سوف نقوم بالتواصل معك في أقرب وقت ممكن.</p>
                <br>
                <button onclick="location.reload()" style="background-color: #eee; border: 1px solid #ccc; padding: 10px 20px; cursor: pointer; border-radius: 5px;">إرسال طلب آخر</button>
            </div>
        </div>
		
    </div>

    <script>
        document.getElementById('registrationForm').addEventListener('submit', function(event) {
            event.preventDefault();
            document.getElementById('form-section').style.display = 'none';
            document.getElementById('thank-you-section').style.display = 'block';
        });
    </script>

</body>
</html>
